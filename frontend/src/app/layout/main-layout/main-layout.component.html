<div *ngIf="loading" class="loading">
  Cargando sistema...
</div>

<mat-sidenav-container *ngIf="!loading" class="layout">
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="brand">
      <mat-icon>inventory_2</mat-icon>
      <span>TAP Admin</span>
    </div>

    <mat-nav-list>
      <a
        mat-list-item
        *ngFor="let section of authService.sections"
        [routerLink]="section.route"
      >
        <mat-icon matListItemIcon>{{ section.icon }}</mat-icon>
        <span matListItemTitle>{{ section.name }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <span>Sistema Administrativo</span>
      <span class="spacer"></span>
      <span class="user">{{ authService.user?.name }}</span>
      <button mat-icon-button (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
