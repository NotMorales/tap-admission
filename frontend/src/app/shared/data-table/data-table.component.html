<table mat-table [dataSource]="rows" class="table">

  <ng-container *ngFor="let column of columns" [matColumnDef]="column.key">
    <th mat-header-cell *matHeaderCellDef>
      {{ column.label }}
    </th>

    <td mat-cell *matCellDef="let row">
      <ng-container [ngSwitch]="column.type">

        <span *ngSwitchCase="'money'">
          {{ row[column.key] | currency:'MXN':'symbol':'1.2-2' }}
        </span>

        <span *ngSwitchCase="'status'" class="status" [class.active]="row[column.key] === 'ACTIVE'">
          {{ row[column.key] }}
        </span>

        <span *ngSwitchDefault>
          {{ row[column.key] }}
        </span>

      </ng-container>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>

    <td mat-cell *matCellDef="let row">
      <button mat-icon-button color="primary" *ngIf="canView" (click)="view.emit(row)">
        <mat-icon>visibility</mat-icon>
      </button>

      <button mat-icon-button color="accent" *ngIf="canEdit" (click)="edit.emit(row)">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" *ngIf="canDelete" (click)="delete.emit(row)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<div class="empty" *ngIf="rows.length === 0">
  No hay registros para mostrar.
</div>
